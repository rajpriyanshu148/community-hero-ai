version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: community_hero_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hero
      POSTGRES_PASSWORD: heropassword
      POSTGRES_DB: community_hero
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hero -d community_hero']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: community_hero_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: community_hero_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://hero:heropassword@postgres:5432/community_hero
      REDIS_URL: redis://redis:6379
      PORT: 5000
      FRONTEND_URL: http://localhost:3000
    env_file:
      - ./backend/.env
    ports:
      - '5000:5000'
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: community_hero_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
      NEXT_PUBLIC_SOCKET_URL: http://localhost:5000
    env_file:
      - ./frontend/.env.local
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
